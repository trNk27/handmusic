<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>MusicMaker — Hand Shape Sounds</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #0d0f14;
      color: #e8eaf0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header { text-align: center; padding: 16px 12px 4px; }
    header h1 { margin: 0; font-size: 1.3rem; }
    header p { margin: 6px 0 0; color: #9aa0b0; font-size: 0.85rem; }

    #stage {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin-top: 12px;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }
    #video { display: none; }
    #canvas { width: 100%; height: 100%; display: block; }

    #overlay {
      position: absolute;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: linear-gradient(180deg, rgba(0,0,0,0.65), rgba(0,0,0,0));
      pointer-events: none;
    }
    #gesture { font-size: 1.4rem; font-weight: 600; }
    #note { color: #6ee7a8; font-size: 0.9rem; }

    #start {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(0,0,0,0.55);
      border: none;
      color: #fff;
      font-size: 1.1rem;
      cursor: pointer;
    }
    #start span.big { font-size: 1.4rem; font-weight: 700; }
    #start.hidden { display: none; }

    footer { color: #6b7180; font-size: 0.75rem; padding: 10px; text-align: center; }
    a { color: #8ab4ff; }
  </style>
</head>
<body>
  <header>
    <h1>🖐️ MusicMaker</h1>
    <p>Show a hand to the camera and it plays a sound for the shape.</p>
  </header>

  <div id="stage">
    <video id="video" playsinline></video>
    <canvas id="canvas"></canvas>
    <div id="overlay">
      <div id="gesture">—</div>
      <div id="note"></div>
    </div>
    <button id="start">
      <span class="big">▶ Start camera</span>
      <span>Tap to allow camera &amp; sound</span>
    </button>
  </div>

  <footer>
    Runs entirely in your browser — nothing is uploaded.
    Tip: open this page <strong>on your phone</strong> to use the phone camera.
  </footer>

  <script type="module" src="./app.js"></script>
</body>
</html>
